name: Build Android APK

on:
  workflow_dispatch:
  push:
    tags: ['android-v*']

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install deps
        run: npm ci

      - name: Build web app
        run: npm run build
        env:
          VITE_BUILD: ${{ github.run_number }}

      - name: Add Android platform
        run: npx cap add android

      - name: Grant location permissions in the manifest
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          grep -q ACCESS_FINE_LOCATION "$MANIFEST" || \
            sed -i 's#<uses-permission android:name="android.permission.INTERNET" />#<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />#' "$MANIFEST"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Apply Parikrama icon & splash
        run: npx @capacitor/assets generate --android --assetPath assets

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Stage APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk parikrama.apk

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: parikrama-apk
          path: parikrama.apk

      - name: Publish to a stable release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete android --yes --cleanup-tag || true
          gh release create android parikrama.apk \
            --title "Parikrama · Android (debug)" \
            --notes "Sideload build of Parikrama. On your phone: enable 'Install unknown apps' for your browser, then open this APK. Rebuilt from the latest web app."
