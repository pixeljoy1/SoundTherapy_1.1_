<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <radialGradient id="bg" cx="40%" cy="30%" r="95%">
      <stop offset="0%" stop-color="#3A2A12"/>
      <stop offset="55%" stop-color="#221708"/>
      <stop offset="100%" stop-color="#120B04"/>
    </radialGradient>
    <radialGradient id="lamp" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD98A" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#F4A83C" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#F4A83C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="book" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF3D8"/>
      <stop offset="100%" stop-color="#E8C98F"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="26"/></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <radialGradient id="vig" cx="50%" cy="45%" r="75%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <ellipse cx="470" cy="430" rx="330" ry="240" fill="url(#lamp)" filter="url(#blur)"/>
  <!-- desk lamp: arm + head -->
  <g filter="url(#soft)">
    <path d="M205 470 L225 300 L330 210" stroke="#0E0A05" stroke-width="16" fill="none" stroke-linecap="round"/>
    <path d="M330 210 l86 44 a96 96 0 0 1 -118 52 z" fill="#0E0A05"/>
    <ellipse cx="205" cy="478" rx="66" ry="14" fill="#0E0A05"/>
  </g>
  <ellipse cx="470" cy="470" rx="210" ry="60" fill="#FFDf9E" opacity="0.22" filter="url(#blur)"/>
  <!-- open book -->
  <g filter="url(#soft)">
    <path d="M340 470 q90 -34 130 0 q40 -34 130 0 l-6 44 q-84 -28 -124 2 q-40 -30 -124 -2 z" fill="url(#book)"/>
    <path d="M470 470 l0 44" stroke="#C9A468" stroke-width="3"/>
  </g>
  <!-- floating study sparks -->
  <g fill="#FFD98A">
    <circle cx="560" cy="250" r="6" opacity="0.9"/>
    <circle cx="608" cy="200" r="4" opacity="0.6"/>
    <circle cx="520" cy="180" r="3" opacity="0.45"/>
    <circle cx="650" cy="290" r="3.4" opacity="0.5"/>
    <circle cx="586" cy="330" r="2.6" opacity="0.4"/>
  </g>
  <rect width="800" height="600" fill="url(#vig)"/>
  <rect width="800" height="600" filter="url(#grain)" opacity="0.05"/>
</svg>
