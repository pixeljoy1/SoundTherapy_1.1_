<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="90%">
      <stop offset="0%" stop-color="#0A2C3D"/>
      <stop offset="60%" stop-color="#07202E"/>
      <stop offset="100%" stop-color="#030D14"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#DFFBFF"/>
      <stop offset="100%" stop-color="#4FD1E8"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4FD1E8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#4FD1E8" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="30"/></filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <radialGradient id="vig" cx="50%" cy="45%" r="75%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <ellipse cx="400" cy="300" rx="320" ry="240" fill="url(#glow)" filter="url(#blur)"/>
  <!-- breathing rings, inhale to exhale -->
  <g stroke="#9FE8F4" fill="none">
    <circle cx="400" cy="300" r="70" stroke-width="3" opacity="0.9"/>
    <circle cx="400" cy="300" r="120" stroke-width="2.2" opacity="0.6"/>
    <circle cx="400" cy="300" r="172" stroke-width="1.6" opacity="0.38"/>
    <circle cx="400" cy="300" r="226" stroke-width="1.1" opacity="0.2"/>
  </g>
  <!-- phase ticks: in · hold · out -->
  <g fill="#DFFBFF" opacity="0.85">
    <circle cx="400" cy="230" r="5"/>
    <circle cx="470" cy="300" r="5" opacity="0.6"/>
    <circle cx="400" cy="370" r="5" opacity="0.4"/>
  </g>
  <circle cx="400" cy="300" r="26" fill="url(#core)"/>
  <rect width="800" height="600" fill="url(#vig)"/>
  <rect width="800" height="600" filter="url(#grain)" opacity="0.05"/>
</svg>
