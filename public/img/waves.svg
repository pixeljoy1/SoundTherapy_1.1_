<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#131238"/>
      <stop offset="55%" stop-color="#1C1A5E"/>
      <stop offset="100%" stop-color="#08071C"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7C6FF2" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7C6FF2" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7C6FF2" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="mist"><feGaussianBlur stdDeviation="22"/></filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <radialGradient id="vig" cx="50%" cy="45%" r="75%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- moon glow -->
  <circle cx="620" cy="140" r="120" fill="#B9B2FF" opacity="0.25" filter="url(#mist)"/>
  <circle cx="620" cy="140" r="34" fill="#EDEAFF" opacity="0.9" filter="url(#soft)"/>
  <!-- long-exposure silk water bands -->
  <g filter="url(#soft)">
    <path d="M0 330 q200 -36 400 0 t400 0 l0 40 q-200 30 -400 0 t-400 0 z" fill="url(#wave1)" opacity="0.6"/>
    <path d="M0 400 q240 -30 480 4 t320 -8 l0 44 q-240 26 -480 -6 t-320 8 z" fill="url(#wave1)" opacity="0.42"/>
    <path d="M0 470 q180 -22 380 4 t420 -6 l0 132 L0 600 z" fill="#0D0C30" opacity="0.9"/>
  </g>
  <!-- slow pulse line: resting heart tempo -->
  <path d="M60 240 l90 0 20 -26 22 52 20 -26 96 0" stroke="#B9B2FF" stroke-width="2.4" fill="none" opacity="0.5" stroke-linecap="round"/>
  <rect width="800" height="600" fill="url(#vig)"/>
  <rect width="800" height="600" filter="url(#grain)" opacity="0.05"/>
</svg>
