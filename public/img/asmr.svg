<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#231334"/>
      <stop offset="60%" stop-color="#160B24"/>
      <stop offset="100%" stop-color="#0A0512"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9A2F2" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#C9A2F2" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="28"/></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="1.6"/></filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <radialGradient id="vig" cx="50%" cy="45%" r="75%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <ellipse cx="400" cy="280" rx="300" ry="230" fill="url(#glow)" filter="url(#blur)"/>
  <!-- feather, the ASMR trigger -->
  <g filter="url(#soft)">
    <path d="M400 110 q120 130 26 350 q-10 18 -22 0 q-96 -220 -4 -350" fill="#E2CDF9" opacity="0.9"/>
    <path d="M404 130 l0 320" stroke="#B48CE0" stroke-width="4"/>
    <g stroke="#CBA9EE" stroke-width="2" opacity="0.8">
      <path d="M404 180 q-40 8 -58 34"/>
      <path d="M404 180 q40 8 58 34"/>
      <path d="M404 240 q-46 10 -64 40"/>
      <path d="M404 240 q46 10 64 40"/>
      <path d="M404 300 q-42 12 -58 44"/>
      <path d="M404 300 q42 12 58 44"/>
      <path d="M404 360 q-32 10 -44 36"/>
      <path d="M404 360 q32 10 44 36"/>
    </g>
  </g>
  <!-- tingles: cascading soft sparks -->
  <g fill="#EAD9FF">
    <circle cx="286" cy="180" r="3.4" opacity="0.75"/>
    <circle cx="252" cy="250" r="2.6" opacity="0.55"/>
    <circle cx="300" cy="330" r="2.2" opacity="0.45"/>
    <circle cx="524" cy="200" r="3" opacity="0.65"/>
    <circle cx="556" cy="286" r="2.4" opacity="0.5"/>
    <circle cx="520" cy="368" r="2" opacity="0.4"/>
  </g>
  <rect width="800" height="600" fill="url(#vig)"/>
  <rect width="800" height="600" filter="url(#grain)" opacity="0.05"/>
</svg>
