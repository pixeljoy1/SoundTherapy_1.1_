<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="90%">
      <stop offset="0%" stop-color="#3D2410"/>
      <stop offset="60%" stop-color="#241205"/>
      <stop offset="100%" stop-color="#120801"/>
    </radialGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F2C879"/>
      <stop offset="55%" stop-color="#C98B3A"/>
      <stop offset="100%" stop-color="#8A5A1E"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F2A65A" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#F2A65A" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="28"/></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="2.6"/></filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <radialGradient id="vig" cx="50%" cy="45%" r="75%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <ellipse cx="400" cy="360" rx="320" ry="220" fill="url(#glow)" filter="url(#blur)"/>
  <!-- resonance rings above the bowl -->
  <g stroke="#F2C879" fill="none" opacity="0.75">
    <ellipse cx="400" cy="300" rx="130" ry="26" stroke-width="2.4"/>
    <ellipse cx="400" cy="264" rx="180" ry="34" stroke-width="1.8" opacity="0.55"/>
    <ellipse cx="400" cy="222" rx="236" ry="44" stroke-width="1.3" opacity="0.32"/>
  </g>
  <!-- singing bowl -->
  <g filter="url(#soft)">
    <path d="M250 330 a150 150 0 0 0 300 0 z" fill="url(#metal)"/>
    <ellipse cx="400" cy="330" rx="150" ry="26" fill="#5C3A12"/>
    <ellipse cx="400" cy="330" rx="132" ry="20" fill="#2A1706"/>
    <ellipse cx="400" cy="478" rx="70" ry="12" fill="#000" opacity="0.5"/>
    <!-- striker -->
    <g transform="rotate(24 610 320)">
      <rect x="596" y="220" width="26" height="180" rx="13" fill="#6B4A26"/>
      <rect x="590" y="200" width="38" height="52" rx="19" fill="#3D2410"/>
    </g>
  </g>
  <!-- incense wisp -->
  <path d="M212 430 q-26 -60 8 -104 q30 -40 4 -92 q-16 -34 8 -64" stroke="#E8D9C4" stroke-width="3" fill="none" opacity="0.4" filter="url(#soft)"/>
  <rect width="800" height="600" fill="url(#vig)"/>
  <rect width="800" height="600" filter="url(#grain)" opacity="0.05"/>
</svg>
