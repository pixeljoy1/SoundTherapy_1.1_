<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#26251C"/>
      <stop offset="60%" stop-color="#171812"/>
      <stop offset="100%" stop-color="#0A0B08"/>
    </linearGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8C8A76"/>
      <stop offset="100%" stop-color="#4A4A3C"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D9CFA8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#D9CFA8" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="24"/></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="2.6"/></filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <radialGradient id="vig" cx="50%" cy="45%" r="75%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <circle cx="400" cy="250" r="230" fill="url(#halo)" filter="url(#blur)"/>
  <circle cx="400" cy="250" r="168" stroke="#D9CFA8" stroke-width="1.4" fill="none" opacity="0.4"/>
  <!-- seated figure in meditation, abstract silhouette -->
  <g fill="url(#stone)" filter="url(#soft)">
    <ellipse cx="400" cy="196" rx="56" ry="62"/>
    <path d="M400 132 q20 -26 0 -44 q-20 18 0 44" opacity="0.9"/>
    <path d="M310 430 q-4 -120 90 -172 q94 52 90 172 q-90 34 -180 0" />
    <path d="M292 402 q40 44 108 46 q68 -2 108 -46 q26 40 -14 58 q-94 34 -188 0 q-40 -18 -14 -58" opacity="0.85"/>
  </g>
  <!-- moss flecks -->
  <g fill="#7C8A5A" opacity="0.6">
    <circle cx="362" cy="180" r="4"/>
    <circle cx="438" cy="238" r="3"/>
    <circle cx="352" cy="330" r="5"/>
    <circle cx="470" cy="360" r="3.6"/>
  </g>
  <!-- drifting light motes -->
  <g fill="#E8DFC0">
    <circle cx="270" cy="150" r="2.6" opacity="0.55"/>
    <circle cx="540" cy="130" r="3" opacity="0.5"/>
    <circle cx="580" cy="300" r="2.2" opacity="0.4"/>
  </g>
  <rect width="800" height="600" fill="url(#vig)"/>
  <rect width="800" height="600" filter="url(#grain)" opacity="0.05"/>
</svg>
