<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#101A2E"/>
      <stop offset="100%" stop-color="#060B16"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <radialGradient id="vig" cx="50%" cy="45%" r="75%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- bokeh city lights through wet glass -->
  <g filter="url(#blur)">
    <circle cx="150" cy="420" r="34" fill="#F2C879" opacity="0.5"/>
    <circle cx="300" cy="470" r="22" fill="#7BA7C9" opacity="0.55"/>
    <circle cx="470" cy="440" r="40" fill="#5E86B8" opacity="0.4"/>
    <circle cx="640" cy="480" r="26" fill="#F2A65A" opacity="0.42"/>
    <circle cx="720" cy="400" r="18" fill="#9FD0E8" opacity="0.5"/>
    <circle cx="380" cy="520" r="16" fill="#D9EAF2" opacity="0.35"/>
  </g>
  <!-- rain streaks -->
  <g stroke="#AFC8DE" stroke-linecap="round" opacity="0.75">
    <line x1="120" y1="60" x2="104" y2="180" stroke-width="3"/>
    <line x1="230" y1="120" x2="216" y2="260" stroke-width="2.4" opacity="0.6"/>
    <line x1="330" y1="40" x2="314" y2="200" stroke-width="3.4"/>
    <line x1="430" y1="140" x2="418" y2="250" stroke-width="2" opacity="0.55"/>
    <line x1="520" y1="60" x2="504" y2="210" stroke-width="3"/>
    <line x1="620" y1="120" x2="606" y2="270" stroke-width="2.6" opacity="0.65"/>
    <line x1="700" y1="50" x2="686" y2="170" stroke-width="2.2" opacity="0.5"/>
    <line x1="60" y1="220" x2="48" y2="330" stroke-width="2.2" opacity="0.45"/>
  </g>
  <!-- droplets on glass -->
  <g fill="#D9EAF2">
    <circle cx="180" cy="300" r="7" opacity="0.65"/>
    <circle cx="410" cy="330" r="5" opacity="0.5"/>
    <circle cx="580" cy="300" r="8" opacity="0.6"/>
    <circle cx="680" cy="340" r="4.4" opacity="0.42"/>
  </g>
  <rect width="800" height="600" fill="url(#vig)"/>
  <rect width="800" height="600" filter="url(#grain)" opacity="0.05"/>
</svg>
