<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C9E3C4"/>
      <stop offset="55%" stop-color="#5E8F6A"/>
      <stop offset="100%" stop-color="#12301E"/>
    </linearGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="5"/></filter>
    <filter id="mist"><feGaussianBlur stdDeviation="24"/></filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <radialGradient id="vig" cx="50%" cy="45%" r="75%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.5"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- light rays -->
  <g fill="#F2F7E8" opacity="0.35" filter="url(#mist)">
    <polygon points="220,0 320,0 180,420 140,420"/>
    <polygon points="430,0 500,0 420,380 380,380"/>
  </g>
  <!-- ridges of canopy, back to front -->
  <path d="M0 300 q100 -70 200 -20 q120 60 250 -10 q180 -80 350 10 L800 600 L0 600 z" fill="#3F7052" opacity="0.75" filter="url(#soft)"/>
  <path d="M0 390 q140 -60 260 0 q140 66 300 -6 q130 -50 240 20 L800 600 L0 600 z" fill="#28513A" opacity="0.9" filter="url(#soft)"/>
  <path d="M0 480 q170 -54 330 6 q180 62 470 -10 L800 600 L0 600 z" fill="#16351F"/>
  <!-- drifting mist bands -->
  <ellipse cx="360" cy="360" rx="330" ry="46" fill="#E8F2E0" opacity="0.3" filter="url(#mist)"/>
  <ellipse cx="520" cy="450" rx="300" ry="40" fill="#E8F2E0" opacity="0.22" filter="url(#mist)"/>
  <!-- birds -->
  <g stroke="#123021" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.8">
    <path d="M560 150 q12 -12 24 0 q12 -12 24 0"/>
    <path d="M620 190 q9 -9 18 0 q9 -9 18 0"/>
  </g>
  <rect width="800" height="600" fill="url(#vig)"/>
  <rect width="800" height="600" filter="url(#grain)" opacity="0.05"/>
</svg>
