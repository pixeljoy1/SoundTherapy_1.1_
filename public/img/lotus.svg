<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2E1608"/>
      <stop offset="55%" stop-color="#4A2410"/>
      <stop offset="100%" stop-color="#180A03"/>
    </linearGradient>
    <linearGradient id="petal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE8D2"/>
      <stop offset="100%" stop-color="#F2A65A"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F2C879" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#F2C879" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="26"/></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <radialGradient id="vig" cx="50%" cy="45%" r="75%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <ellipse cx="400" cy="330" rx="300" ry="220" fill="url(#glow)" filter="url(#blur)"/>
  <!-- lotus -->
  <g filter="url(#soft)">
    <path d="M400 180 q60 70 0 170 q-60 -100 0 -170" fill="url(#petal)"/>
    <path d="M310 230 q80 30 78 122 q-110 -22 -78 -122" fill="url(#petal)" opacity="0.92"/>
    <path d="M490 230 q-80 30 -78 122 q110 -22 78 -122" fill="url(#petal)" opacity="0.92"/>
    <path d="M240 300 q90 -6 148 58 q-130 24 -148 -58" fill="url(#petal)" opacity="0.85"/>
    <path d="M560 300 q-90 -6 -148 58 q130 24 148 -58" fill="url(#petal)" opacity="0.85"/>
  </g>
  <!-- still water ripples -->
  <g stroke="#F2C879" fill="none" opacity="0.5">
    <ellipse cx="400" cy="420" rx="170" ry="18" stroke-width="2"/>
    <ellipse cx="400" cy="448" rx="250" ry="26" stroke-width="1.4" opacity="0.6"/>
    <ellipse cx="400" cy="482" rx="330" ry="34" stroke-width="1" opacity="0.35"/>
  </g>
  <rect width="800" height="600" fill="url(#vig)"/>
  <rect width="800" height="600" filter="url(#grain)" opacity="0.05"/>
</svg>
