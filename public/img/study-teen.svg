<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B1230"/>
      <stop offset="60%" stop-color="#141B4A"/>
      <stop offset="100%" stop-color="#070A1C"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6C9EF8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6C9EF8" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="30"/></filter>
    <filter id="soft"><feGaussianBlur stdDeviation="2.4"/></filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <radialGradient id="vig" cx="50%" cy="45%" r="75%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <ellipse cx="400" cy="300" rx="300" ry="230" fill="url(#glow)" filter="url(#blur)"/>
  <!-- headphones -->
  <g filter="url(#soft)" stroke="#DCE6FF" fill="none" stroke-linecap="round">
    <path d="M250 340 a150 150 0 0 1 300 0" stroke-width="18"/>
    <rect x="228" y="330" width="52" height="96" rx="26" fill="#DCE6FF" stroke="none"/>
    <rect x="520" y="330" width="52" height="96" rx="26" fill="#DCE6FF" stroke="none"/>
  </g>
  <!-- sound waves -->
  <g stroke="#6C9EF8" fill="none" stroke-linecap="round" opacity="0.8">
    <path d="M160 380 q14 -28 0 -56" stroke-width="7"/>
    <path d="M120 396 q24 -44 0 -88" stroke-width="6" opacity="0.55"/>
    <path d="M640 380 q-14 -28 0 -56" stroke-width="7"/>
    <path d="M680 396 q-24 -44 0 -88" stroke-width="6" opacity="0.55"/>
  </g>
  <!-- focus dots rising -->
  <g fill="#9FC0FF">
    <circle cx="400" cy="170" r="5" opacity="0.85"/>
    <circle cx="360" cy="130" r="3.4" opacity="0.55"/>
    <circle cx="446" cy="120" r="2.8" opacity="0.4"/>
  </g>
  <rect width="800" height="600" fill="url(#vig)"/>
  <rect width="800" height="600" filter="url(#grain)" opacity="0.05"/>
</svg>
